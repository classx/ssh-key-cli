name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ssh-key-sync

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            cross: true

          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            cross: false

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target std is installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Run tests
        if: ${{ !matrix.cross }}
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Determine archive name
        id: archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          echo "name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "dir=_dist/${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package archive
        run: |
          mkdir -p "${{ steps.archive.outputs.dir }}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${{ steps.archive.outputs.dir }}/"
          cp README.md LICENSE "${{ steps.archive.outputs.dir }}/" 2>/dev/null || true
          cd _dist
          tar czf "${{ steps.archive.outputs.name }}.tar.gz" "${{ steps.archive.outputs.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.archive.outputs.name }}
          path: _dist/${{ steps.archive.outputs.name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
